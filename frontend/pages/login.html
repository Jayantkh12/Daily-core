<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign up or log in to DAILYCORE — manage your orders, track delivery, and enjoy exclusive member benefits.">
    <title>Sign Up — DAILYCORE</title>
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <a href="javascript:history.back()" class="close-btn">&times;</a>
            <h1>Sign Up</h1>
            <p>Already a member? <a href="#">Log In</a></p>
            <button class="btn google-btn" id="google-signup-btn">Sign up with Google</button>
            <button class="btn facebook-btn" id="facebook-signup-btn">Sign up with Facebook</button>
            <div class="divider">or</div>
            <button class="btn email-btn" id="email-signup-btn">Sign up with email</button>
            <p class="note">Your profile will be set to public automatically when you sign up. You can change this later in your profile settings.</p>
        </div>
    </div>
    <script src="../assets/js/api.js"></script>
    <script>
        document.getElementById('google-signup-btn').addEventListener('click', () => {
            alert('Google sign-up — backend integration coming soon.');
        });
        document.getElementById('facebook-signup-btn').addEventListener('click', () => {
            alert('Facebook sign-up — backend integration coming soon.');
        });
        document.getElementById('email-signup-btn').addEventListener('click', () => {
            alert('Email sign-up — backend integration coming soon.');
        });
    </script>
</body>
</html>
