<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — DAILYCORE</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Cambria,serif; }
        body { background:#0f0025; color:white; display:flex; min-height:100vh; }
        .sidebar { width:220px; background:#1a0035; padding:30px 20px; flex-shrink:0; }
        .sidebar .brand { font-size:24px; font-weight:800; color:#9d60ec; margin-bottom:40px; }
        .sidebar nav a { display:block; color:#ccc; text-decoration:none; padding:10px 14px; border-radius:8px; margin-bottom:6px; transition:background .2s; }
        .sidebar nav a:hover, .sidebar nav a.active { background:#8037de; color:white; }
        .sidebar nav a i { margin-right:10px; }
        .main { flex:1; padding:40px; }
        .main h1 { font-size:1.8em; margin-bottom:30px; }
        .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:40px; }
        .stat-card { background:#1a0035; border:1px solid rgba(255,255,255,.1); border-radius:12px; padding:24px; }
        .stat-card .label { color:#aaa; font-size:.85em; margin-bottom:8px; }
        .stat-card .value { font-size:2em; font-weight:700; color:#9d60ec; }
        .notice { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-radius:12px; padding:30px; text-align:center; }
        .notice p { color:#aaa; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="sidebar">
        <div class="brand">DAILYCORE</div>
        <nav>
            <a href="index.html" class="active"><i class="fa-solid fa-gauge"></i> Dashboard</a>
            <a href="../products/index.html"><i class="fa-solid fa-box"></i> Products</a>
            <a href="../orders/index.html"><i class="fa-solid fa-bag-shopping"></i> Orders</a>
            <a href="../customers/index.html"><i class="fa-solid fa-users"></i> Customers</a>
            <a href="../settings/index.html"><i class="fa-solid fa-gear"></i> Settings</a>
            <a href="../../frontend/index.html" target="_blank"><i class="fa-solid fa-arrow-up-right-from-square"></i> View Site</a>
        </nav>
    </div>
    <div class="main">
        <h1>Dashboard</h1>
        <div class="stats">
            <div class="stat-card"><div class="label">Total Orders</div><div class="value" id="stat-orders">—</div></div>
            <div class="stat-card"><div class="label">Total Products</div><div class="value" id="stat-products">—</div></div>
            <div class="stat-card"><div class="label">Customers</div><div class="value" id="stat-customers">—</div></div>
            <div class="stat-card"><div class="label">Revenue</div><div class="value" id="stat-revenue">—</div></div>
        </div>
        <div class="notice">
            <i class="fa-solid fa-circle-info fa-2x" style="color:#9d60ec; margin-bottom:16px;"></i>
            <p>Admin panel is ready. Connect the backend (Node.js + MongoDB) to populate live data.</p>
        </div>
    </div>
    <script>
        // These will pull from the API once backend is live
        // document.getElementById('stat-orders').textContent = data.totalOrders;
    </script>
</body>
</html>
